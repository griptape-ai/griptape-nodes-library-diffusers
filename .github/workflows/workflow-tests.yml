name: Workflow Tests

on:
  push:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-tests:
    # TODO: https://github.com/griptape-ai/griptape-nodes-library-advanced-media/issues/4
    if: false
    runs-on: ubuntu-latest
    env:
      GT_CLOUD_API_KEY: ${{ secrets.GT_CLOUD_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system griptape-nodes pytest pytest-asyncio python-dotenv

      - name: Run workflow tests
        run: |
          pytest -s tests/workflows
          exit_code=$?
          [ $exit_code -eq 5 ] && exit 0 || exit $exit_code
